<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');
  </style>
  <radialGradient id="bg" cx="22%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#16120a"/>
    <stop offset="100%" stop-color="#060606"/>
  </radialGradient>
  <radialGradient id="glow" cx="22%" cy="50%" r="45%">
    <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="na" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.75"/>
    <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="nr" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ef4444" stop-opacity="0.75"/>
    <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="ng" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#22c55e" stop-opacity="0.75"/>
    <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
  </radialGradient>
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#0d0d0d" stroke-width="0.6"/>
  </pattern>
  <linearGradient id="kGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#fff1aa"/>
    <stop offset="35%"  stop-color="#f8c435"/>
    <stop offset="70%"  stop-color="#d97706"/>
    <stop offset="100%" stop-color="#92400e"/>
  </linearGradient>
  <linearGradient id="kStroke" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#fde68a" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#78350f"  stop-opacity="0.2"/>
  </linearGradient>
  <pattern id="scanlines" width="1" height="4" patternUnits="userSpaceOnUse">
    <rect width="1" height="1" y="0" fill="black" fill-opacity="0.18"/>
  </pattern>
  <mask id="kMask">
    <text x="195" y="224"
      font-family="'Bebas Neue','Impact','Arial Narrow',sans-serif"
      font-size="96" letter-spacing="8" fill="white">KAIROS</text>
  </mask>
  <linearGradient id="sGold" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#fde68a"/>
    <stop offset="100%" stop-color="#d97706"/>
  </linearGradient>
  <linearGradient id="sRed" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#fca5a5"/>
    <stop offset="100%" stop-color="#dc2626"/>
  </linearGradient>
  <linearGradient id="sGreen" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#86efac"/>
    <stop offset="100%" stop-color="#16a34a"/>
  </linearGradient>
</defs>

<!-- Base layers -->
<rect width="1200" height="400" fill="url(#bg)"/>
<rect width="1200" height="400" fill="url(#grid)"/>
<rect width="1200" height="400" fill="url(#glow)"/>
<rect x="0" y="0"     width="1200" height="1.5" fill="#f59e0b" opacity="0.55"/>
<rect x="0" y="398.5" width="1200" height="1.5" fill="#f59e0b" opacity="0.18"/>

